name: Run SQL Tests

on: [push, pull_request]

jobs:
  test-db:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Execute SQL Script
        run: |
          sqlite3 test_db.db "CREATE TABLE users (id INT PRIMARY KEY, name TEXT); INSERT INTO users (name) VALUES ('Alice'), ('Bob'); SELECT * FROM users;"

